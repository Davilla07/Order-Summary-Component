<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Mentor - Order Summary</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/icon"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <main id="main-content">
      <div class="card">
        <img
          class="card__img--illustration-hero"
          src="./images/illustration-hero.svg"
          alt="Image Of The Hero Illustration"
        />
        <div class="card__content">
          <h1 class="card__content--title"><strong>Order Summary</strong></h1>
          <p class="card__content--description">
            You can now listen to millions of songs, audiobook, and podcasts on
            any device anywhere you like!
          </p>
        </div>
        <div class="card__plan">
          <img src="./images/icon-music.svg" alt="Icon Music" />
          <div class="card__plan--annual">
            <p class="u-text-blue"><strong>Annual Plan</strong></p>
            <p class="u-text-gray">$59,99/year</p>
          </div>
          <div class="card__plan--change-plan">
            <p><a href="#" aria-disabled="true">Change</a></p>
          </div>
        </div>
        <div class="card__buttons">
          <button type="button" class="btn btn--proceed">
            Proceed to Payment
          </button>
          <button type="button" class="btn btn--cancel">Cancel Order</button>
        </div>
      </div>
    </main>
  </body>
</html>
